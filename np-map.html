      margin: 0;
      padding: 0;

    }

    :root {
      --np-blue:        #0070BA;
      --np-green:       #4CAF50;
      --np-blue-light:  rgba(0, 112, 186, 0.15);
      --np-green-light: rgba(76, 175, 80, 0.15);
      --np-blue-dark:   #005a96;
      --np-green-dark:  #388E3C;
    }

    html, body {
      height: 100%;
      font-family: 'Barlow', sans-serif;
      background: #f0f4f8;
    }

    /* ── View toggle (fixed top-right) ── */
    .view-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 2000;
      display: flex;
      background: #ffffff;
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .view-toggle button {
      display: flex;
      align-items: center;
      gap: 6px;
      border: none;
      background: transparent;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7a99;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-toggle button.active {
      background: var(--np-blue);
      color: #ffffff;
    }

    .view-toggle button svg {
      flex-shrink: 0;
    }

    /* ── Views ── */
    .view-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .view-container.hidden {
      display: none;
    }

    /* ── Map ── */
    #map {
      width: 100%;
      height: 100%;
    }

    /* ── List view ── */
    .list-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .list-count {
      font-size: 12px;
      color: #6b7a99;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .locations-table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    }

    .locations-table thead {
      background: #f8fafc;
    }

    .locations-table th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6b7a99;
      border-bottom: 1px solid #e2e8f0;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    .locations-table th:hover {
      color: #1a2233;
    }

    .sort-indicator {
      display: inline-block;
      margin-left: 4px;
      opacity: 0.5;
      font-size: 10px;
    }

    .sort-indicator.active {
      opacity: 1;
      color: var(--np-blue);
    }

    .locations-table tbody tr {
      border-bottom: 1px solid #f0f4f8;
      transition: background 0.1s;
    }

    .locations-table tbody tr:last-child {
      border-bottom: none;
    }

    .locations-table tbody tr:hover {
      background: #f8fafc;
    }

    .locations-table td {
      padding: 12px 16px;
      font-size: 13px;
      color: #1a2233;
      vertical-align: middle;
    }

    .table-name {
      font-weight: 600;
    }

    .table-address {
      color: #6b7a99;
      font-size: 12px;
    }

    .table-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .table-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .table-badge.dwdm    { background: var(--np-blue-light);  color: var(--np-blue-dark); }
    .table-badge.ethernet { background: var(--np-green-light); color: var(--np-green-dark); }
    .table-badge.dwdm .table-badge-dot    { background: var(--np-blue); }
    .table-badge.ethernet .table-badge-dot { background: var(--np-green); }

    .table-flag {
      font-size: 16px;
      margin-right: 4px;
    }

    /* ── Leaflet popup overrides ── */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 0;
      overflow: hidden;
    }

    .leaflet-popup-content {
      margin: 0;
      min-width: 220px;
    }

    .leaflet-popup-tip-container {
      display: none;
    }

    .popup-inner {
      padding: 16px 18px;
    }

    .popup-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .popup-type-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .popup-type-dot.dwdm    { background: var(--np-blue); }
    .popup-type-dot.ethernet { background: var(--np-green); }

    .popup-name {
      font-size: 14px;
      font-weight: 700;
      color: #1a2233;
      line-height: 1.3;
      font-family: 'Barlow', sans-serif;
    }

    .popup-address {
      font-size: 12px;
      color: #6b7a99;
      margin-bottom: 10px;
      padding-left: 20px;
      font-family: 'Barlow', sans-serif;
    }

    .popup-badge {

      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      margin-left: 20px;
      margin-bottom: 6px;
      font-family: 'Barlow', sans-serif;
    }

    .popup-badge.dwdm    { background: var(--np-blue-light);  color: var(--np-blue-dark); }
    .popup-badge.ethernet { background: var(--np-green-light); color: var(--np-green-dark); }

    .map-legend {
      background: #ffffff;
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.13);
      font-family: 'Barlow', sans-serif;
      min-width: 190px;
    }

    .map-legend-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6b7a99;
      margin-bottom: 10px;
    }

    .map-legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #1a2233;
      margin-bottom: 8px;
    }

    .map-legend-item:last-child {
      margin-bottom: 0;
    }

    .map-legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.15);
    }

// ── State ────────────────────────────────────────────────────────────────
let currentView = 'map';
let sortCol = 'name';
let sortAsc = true;

// ── Map setup ────────────────────────────────────────────────────────────
const NL_BOUNDS = [[50.75, 3.2], [53.6, 7.25]];
  
const map = L.map('map', {
  center: [53.4, 5.3],
  zoom: 8,
  minZoom: 8,
  maxBounds: NL_BOUNDS,
  maxBoundsViscosity: 1.0,
  zoomControl: true,
  attributionControl: true,
});
map.setView([53.4, 5.3], 8);
  
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ── Legend control ───────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'map-legend');
  div.innerHTML = `
    <div class="map-legend-title">Product Type</div>
    <div class="map-legend-item">
      <span class="map-legend-dot dwdm"></span>
      DWDM, Ethernet
    </div>
    <div class="map-legend-item">
      <span class="map-legend-dot ethernet"></span>
      Ethernet
    </div>`;
  return div;
};
legend.addTo(map);

function makeIcon(type) {
  const color  = type === 'dwdm' ? '#0070BA' : '#4CAF50';
  const border = type === 'dwdm' ? '#005a96' : '#388E3C';
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
      <circle cx="9" cy="9" r="7" fill="${color}" stroke="${border}" stroke-width="1.5"/>
      <circle cx="9" cy="9" r="3" fill="white" opacity="0.5"/>
    </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [18,18], iconAnchor: [9,9], popupAnchor: [0,-12] });
}

function makePopup(dc) {
  const typeLabel = dc.type === 'dwdm' ? 'DWDM, Ethernet' : 'Ethernet';
  return `
    <div class="popup-inner">
      <div class="popup-header">
        <div class="popup-type-dot ${dc.type}"></div>
        <div class="popup-name">${dc.name}</div>
      </div>
      <div class="popup-address">${dc.address}, ${dc.city}</div>
      <span class="popup-badge ${dc.type}">${typeLabel}</span>
    </div>`;
}

// Add all markers to the map
datacenters.forEach(dc => {
  const marker = L.marker([dc.lat, dc.lng], { icon: makeIcon(dc.type) });
  marker.bindPopup(makePopup(dc), { maxWidth: 280 });
  marker.addTo(map);
});

// ── View toggle ──────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.getElementById('view-map').classList.toggle('hidden', view !== 'map');
  document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
  document.getElementById('btn-map').classList.toggle('active', view === 'map');
  document.getElementById('btn-list').classList.toggle('active', view === 'list');
  if (view === 'map') {
    setTimeout(() => map.invalidateSize(), 50);
  } else {
    renderTable();
  }
}

// ── Table rendering ──────────────────────────────────────────────────────
function sortTable(col) {
  if (sortCol === col) {
    sortAsc = !sortAsc;
  } else {
    sortCol = col;
    sortAsc = true;
  }
  ['name','city','country','address','type'].forEach(c => {
    const el = document.getElementById('sort-' + c);
    el.classList.toggle('active', c === sortCol);
    if (c === sortCol) el.textContent = sortAsc ? '▲' : '▼';
    else el.textContent = '▲';
  });
  renderTable();
}

function renderTable() {
  const sorted = [...datacenters].sort((a, b) => {
    const va = a[sortCol].toLowerCase();
    const vb = b[sortCol].toLowerCase();
    return sortAsc ? va.localeCompare(vb, 'nl') : vb.localeCompare(va, 'nl');
  });

  document.getElementById('list-count').textContent = `${sorted.length} locatie${sorted.length !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = sorted.map(dc => {
    const typeLabel = dc.type === 'dwdm' ? 'DWDM, Ethernet' : 'Ethernet';
    const flag = COUNTRY_FLAGS[dc.country] || '';
    return `
      <tr>
        <td class="table-name">${dc.name}</td>
        <td>${dc.city}</td>
        <td><span class="table-flag">${flag}</span>${dc.country}</td>
        <td class="table-address">${dc.address}</td>
        <td>
          <span class="table-badge ${dc.type}">
            <span class="table-badge-dot"></span>
            ${typeLabel}
          </span>
        </td>
      </tr>`;
  }).join('');
}
